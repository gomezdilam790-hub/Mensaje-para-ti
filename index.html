        "Tal vez yo no sé para dónde ir, pero si puedo una mañana abrir los ojos y ver los tuyos, sabría dónde quedarme.",

        "Me volví a enamorar pero esta vez fue distinto.",
        "Esa sensación de que de verdad le importas a alguien.",
        "Esos nervios que siento antes de verte.",
        "Me estaba acostumbrando a la soledad, pero llegaste tú.",
        "El amor es paciente, servicial y sin envidia.",
        "Cada día te quiero más.",
        "Tu risa me hace feliz.",
        "Gracias por aparecer en mi vida.",
        "Discúlpame si soy muy intenso.",
        "Al final del día lo que necesito para ser feliz eres tú.",

        "Andábamos sin buscarnos, pero sabiendo que andábamos para encontrarnos.",
        "Gracias por ser mi paz.",
        "Cada vez que te veo, vuelvo a confirmar que eres tú.",

        "No hay rincón de mi alma que no te pertenezca.",
        "Tus abrazos son el lugar donde siempre quiero estar.",
        "Contigo el tiempo no corre, vuela.",
        "Eres mi pensamiento favorito al despertar.",
        "Tu amor es mi mayor fortaleza.",
        "Me haces mejor persona cada día.",
        "Eres la respuesta a todas mis oraciones.",
        "Eres mi pedacito de cielo.",
        "Gracias por iluminar mis días.",
        "A tu lado, todo tiene sentido.",
        "Eres mi hoy y todos mis mañanas.",
        "Tu sonrisa es mi motor.",
        "Contigo la vida es una aventura hermosa.",
        "Prometo cuidarte siempre.",
        "No imagino un futuro si no es a tu lado.",
        "Eres mi persona favorita.",
        "Gracias por hacerme vibrar con el alma.",

        // NUEVAS FRASES
        "Siento que algo muy bonito está creciendo entre nosotros.",
        "Cada día contigo se siente más especial que el anterior.",
        "A veces me sorprendo sonriendo solo por pensar en ti.",
        "Llegaste sin avisar y ahora no imagino mis días sin ti.",
        "Contigo todo se siente más tranquilo y más bonito.",
        "Me gusta la forma en que haces feliz mi corazón.",
        "Eres esa casualidad que terminó cambiando todo.",
        "Cada conversación contigo se convierte en mi parte favorita del día.",
        "No sabía cuánto necesitaba tu presencia hasta que llegaste.",
        "Si algún día dudas de cuánto te quiero, mira todo lo que haces sentir en mí.",
        "Me encanta construir recuerdos contigo.",
        "Tienes una forma de hacer que todo valga la pena.",
        "A veces pienso que el universo conspiró para cruzarnos.",
        "No quiero que esto sea algo pasajero.",
        "Siento paz cuando estoy contigo.",
        "Quiero seguir descubriendo la vida contigo.",
        "Hay personas que llegan y cambian todo. Tú eres una de ellas.",
        "Gracias por existir y coincidir conmigo.",
        "Lo mejor de mis días casi siempre termina siendo tú.",
        "Poco a poco te has convertido en mi lugar favorito.",

    // =========================
    // MENSAJE FINAL
    // =========================

    const MENSAJE_FINAL =
        "Hoy ya no quiero seguir expresando lo que siento solamente en mensajes. Quiero preguntarte algo que llevo sintiendo desde hace mucho tiempo... ¿Quieres ser mi novia? 💍❤️";

    // =========================
    // SISTEMA
    // =========================

    let racha = parseInt(localStorage.getItem('racha_val')) || 44;

    let ultimaFecha = localStorage.getItem('fecha_val');

    let hoy = new Date().toDateString();

    function esFechaFinal() {

        const hoyReal = new Date();

        return (
            hoyReal.getFullYear() === FECHA_FINAL.getFullYear() &&
            hoyReal.getMonth() === FECHA_FINAL.getMonth() &&
            hoyReal.getDate() === FECHA_FINAL.getDate()
        );
    }

    function actualizarPantalla() {

        document.getElementById('streak-num').innerText = racha;

        let nivel = Math.floor(racha / 5) + 1;

        document.getElementById('lvl-tag').innerText = "Nivel " + nivel;

        let progreso = (racha % 5) * 20;

        if (racha > 0 && racha % 5 === 0) {
            progreso = 100;
        }

        document.getElementById('progress-bar').style.width = progreso + "%";

        if (ultimaFecha === hoy) {

            document.getElementById('revelar-ui').classList.add('hidden');

            document.getElementById('mensaje-ui').classList.remove('hidden');

            let mensaje = "";

            // =========================
            // SI ES 28 DE JUNIO
            // =========================

            if (esFechaFinal()) {

                mensaje = MENSAJE_FINAL;

                document.getElementById('btn-vuelve').innerText =
                    "Nuestra historia apenas comienza ❤️";

                document.getElementById('emoji-final').innerText = "💍❤️";

            } else {

                // =========================
                // MENSAJES INFINITOS
                // =========================

                let indiceMensaje =
                    (racha - 1) % MIS_MENSAJES.length;

                mensaje = MIS_MENSAJES[indiceMensaje];

                document.getElementById('btn-vuelve').innerText =
                    "Vuelve mañana";

                document.getElementById('emoji-final').innerText = "🌹";
            }

            let mensajeFinal =
                `<span id="day-label">Día ${racha}</span>` + mensaje;

            document.getElementById('daily-text').innerHTML = mensajeFinal;
        }
    }

    function revelar() {

        if (ultimaFecha !== hoy) {

            racha++;

            ultimaFecha = hoy;

            localStorage.setItem('racha_val', racha);

            localStorage.setItem('fecha_val', hoy);

            actualizarPantalla();
        }
    }

    actualizarPantalla();

</script>
