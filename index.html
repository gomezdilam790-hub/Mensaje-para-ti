<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para mi Amor Bonito 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-girasol: #FFD700;
            --color-girasol-dark: #FFA500;
            --color-texto: #5D4037;
            --fondo-cielo: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 70%, #C8E6C9 100%);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--fondo-cielo);
            min-height: 100vh;
            /* CAMBIO: Permitimos el scroll para que se pueda leer todo */
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; justify-content: center; align-items: flex-start;
        }

        /* --- Flores Amarillas Volando (Fondo) --- */
        .flower-bg {
            position: absolute; top: -10%; color: var(--color-girasol);
            animation: fall linear forwards; z-index: 1;
            opacity: 0.6; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* --- PANTALLA INICIAL --- */
        #capa-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer;
            background: var(--fondo-cielo);
        }
        .girasol-principal { font-size: 6rem; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
        }

        /* --- PANTALLA DE CONTENIDO --- */
        #capa-contenido {
            width: 90%; max-width: 450px;
            padding: 20px 0; display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        /* --- El Ramo Corazón --- */
        .bouquet-heart-container {
            width: 280px; height: 260px; position: relative;
            margin-bottom: 20px; flex-shrink: 0;
        }
        .girasol-corazon {
            font-size: 2rem; position: absolute; opacity: 0; transform: scale(0);
        }
        @keyframes growFlower {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- La Tarjeta de Mensaje --- */
        .message-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px 20px; border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center; border: 4px solid var(--color-girasol);
            opacity: 0; transform: translateY(30px);
            transition: all 1s; width: 100%; box-sizing: border-box;
            margin-bottom: 50px; /* Espacio al final */
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--color-texto); margin: 0 0 10px 0; }
        
        /* --- Contador --- */
        .counter-grid, .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .counter-box { background: #fff9c4; padding: 10px 2px; border-radius: 12px; border: 1px solid var(--color-girasol); }
        .counter-num { display: block; font-size: 1.2rem; font-weight: bold; color: var(--color-girasol-dark); }
        .counter-label { font-size: 0.6rem; color: #777; font-weight: bold; }

        /* --- Texto --- */
        .message-text {
            font-family: 'Dancing Script', cursive; font-size: 1.5rem; color: var(--color-texto);
            line-height: 1.4; border-top: 1px dashed var(--color-girasol); padding-top: 15px;
            text-align: center; word-wrap: break-word;
        }
        .signature { display: block; margin-top: 10px; font-weight: bold; color: var(--color-girasol-dark); opacity: 0; transition: 1s; }

        .hidden { display: none !important; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div id="capa-inicio" onclick="iniciarFlorecimiento()">
        <span class="girasol-principal">🌻</span>
        <p style="font-weight:bold; color:#555;">Toca para florecer</p>
    </div>

    <div id="capa-contenido" class="hidden">
        <div id="corazon-bouquet" class="bouquet-heart-container"></div>

        <div id="tarjeta-mensaje" class="message-card">
            <h1>Flores amarillas para mi amor bonito:</h1>
            
            <div id="seccion-contador" class="hidden">
                <div class="counter-grid">
                    <div class="counter-box"><span id="years" class="counter-num">0</span><span class="counter-label">Años</span></div>
                    <div class="counter-box"><span id="months" class="counter-num">0</span><span class="counter-label">Meses</span></div>
                    <div class="counter-box"><span id="days" class="counter-num">0</span><span class="counter-label">Días</span></div>
                </div>
                <div class="time-grid">
                    <div class="counter-box" style="background:white;"><span id="hours" class="counter-num">0</span><span class="counter-label">Hrs</span></div>
                    <div class="counter-box" style="background:white;"><span id="minutes" class="counter-num">0</span><span class="counter-label">Min</span></div>
                    <div class="counter-box" style="background:white;"><span id="seconds" class="counter-num">0</span><span class="counter-label">Seg</span></div>
                </div>
            </div>

            <div id="texto-typewriter" class="message-text"></div>
            <span id="firma-amor" class="signature">ATT: El amor de tu vida</span>
        </div>
    </div>

    <script>
        const FECHA_INICIO = new Date('2026-02-28T00:00:00'); 
        const MENSAJE_COMPLETO = "si pudiera elegir un lugar seguro seria a tu lado.\ncada dia te quiero mas, cada dia me enamoro mas de ti, cada dia contigo es mejor.";

        const PUNTOS_CORAZON = [
            {x: 140, y: 60}, {x: 180, y: 40}, {x: 220, y: 50}, {x: 240, y: 80}, {x: 250, y: 120}, {x: 230, y: 160}, {x: 190, y: 200}, {x: 140, y: 240},
            {x: 90, y: 200}, {x: 50, y: 160}, {x: 30, y: 120}, {x: 40, y: 80}, {x: 60, y: 50}, {x: 100, y: 40}, {x: 140, y: 90}, 
            {x: 170, y: 90}, {x: 200, y: 110}, {x: 180, y: 150}, {x: 140, y: 180}, {x: 100, y: 150}, {x: 80, y: 110}, {x: 110, y: 90}
        ];

        function iniciarFlorecimiento() {
            document.getElementById('capa-inicio').classList.add('hidden');
            document.getElementById('capa-contenido').classList.remove('hidden');

            const contenedor = document.getElementById('corazon-bouquet');
            PUNTOS_CORAZON.forEach((punto, index) => {
                const flor = document.createElement('span');
                flor.classList.add('girasol-corazon');
                flor.innerHTML = '🌻';
                flor.style.left = punto.x + 'px';
                flor.style.top = punto.y + 'px';
                flor.style.animation = `growFlower 0.5s ease-out ${index * 0.1}s forwards`;
                contenedor.appendChild(flor);
            });

            setTimeout(() => {
                document.getElementById('tarjeta-mensaje').classList.add('visible');
                typeWriter();
            }, 2500);
        }

        function typeWriter() {
            let i = 0;
            const elementoTexto = document.getElementById('texto-typewriter');
            function typing() {
                if (i < MENSAJE_COMPLETO.length) {
                    elementoTexto.innerHTML += MENSAJE_COMPLETO.charAt(i) === '\n' ? '<br>' : MENSAJE_COMPLETO.charAt(i);
                    i++; setTimeout(typing, 50);
                } else {
                    document.getElementById('firma-amor').style.opacity = '1';
                    document.getElementById('seccion-contador').classList.remove('hidden');
                    iniciarCalculoContador();
                }
            }
            typing();
        }

        function iniciarCalculoContador() {
            function actualizar() {
                const ahora = new Date();
                let diff = ahora - FECHA_INICIO;
                let s = Math.floor(diff/1000);
                let m = Math.floor(s/60);
                let h = Math.floor(m/60);
                
                let anios = ahora.getFullYear() - FECHA_INICIO.getFullYear();
                let meses = ahora.getMonth() - FECHA_INICIO.getMonth();
                let dias = ahora.getDate() - FECHA_INICIO.getDate();

                document.getElementById('years').innerText = anios;
                document.getElementById('months').innerText = meses;
                document.getElementById('days').innerText = dias;
                document.getElementById('hours').innerText = h % 24;
                document.getElementById('minutes').innerText = m % 60;
                document.getElementById('seconds').innerText = s % 60;
            }
            setInterval(actualizar, 1000); actualizar();
        }

        function crearFlor() {
            const f = document.createElement('div');
            f.classList.add('flower-bg');
            f.innerHTML = '🌻';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = Math.random() * 3 + 5 + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 7000);
        }
        setInterval(crearFlor, 600);
    </script>
</body>
</html>
