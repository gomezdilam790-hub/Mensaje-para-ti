<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para mi Amor Bonito 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-girasol: #FFD700;
            --color-girasol-dark: #FFA500;
            --color-tallo: #4CAF50;
            --color-texto: #5D4037;
            --fondo-cielo: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 70%, #C8E6C9 100%);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--fondo-cielo);
            min-height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Flores Amarillas Volando (Fondo Pasivo) --- */
        .flower-bg {
            position: absolute; top: -10%; color: var(--color-girasol);
            animation: fall linear forwards; z-index: 1;
            opacity: 0.6; pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* --- PANTALLA INICIAL: El Girasol Mágico --- */
        #capa-inicio {
            position: absolute; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.5s;
        }
        .girasol-principal {
            font-size: 8rem; animation: pulseGlow 2s infinite;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.7));
        }
        @keyframes pulseGlow {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.9)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
        }
        .text-inicio {
            color: var(--color-texto); font-weight: bold; margin-top: 20px;
            font-size: 1.1rem; background: rgba(255,255,255,0.7);
            padding: 10px 20px; border-radius: 20px;
        }

        /* --- PANTALLA DE CONTENIDO (Oculta al inicio) --- */
        #capa-contenido {
            width: 90%; max-width: 450px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        /* --- El Ramo Corazón de Girasoles --- */
        .bouquet-heart-container {
            width: 300px; height: 300px; position: relative;
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center;
        }
        
        /* Girasoles individuales para formar el corazón */
        .girasol-corazon {
            font-size: 2.5rem; position: absolute;
            opacity: 0; transform: scale(0);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
            z-index: 10;
        }
        
        /* Animación de crecimiento individual */
        @keyframes growFlower {
            0% { opacity: 0; transform: scale(0) rotate(-45deg); }
            70% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* --- La Tarjeta de Mensaje --- */
        .message-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px 20px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center; border: 4px solid var(--color-girasol);
            opacity: 0; transform: translateY(20px);
            transition: opacity 1s, transform 1s;
        }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--color-texto); margin-bottom: 10px; line-height: 1.2; }
        .sub-msg { color: #4CAF50; font-weight: 600; margin-bottom: 20px; font-size: 1rem; text-transform: uppercase; }

        /* --- Estilo del Contador --- */
        .counter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 15px;
        }
        .time-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 25px;
        }
        .counter-box {
            background: #fff9c4; padding: 10px 5px; border-radius: 12px;
            border: 1px solid var(--color-girasol);
        }
        .counter-num { display: block; font-size: 1.3rem; font-weight: bold; color: var(--color-girasol-dark); }
        .counter-label { font-size: 0.6rem; color: #777; text-transform: uppercase; font-weight: bold; }

        /* --- El Mensaje Typewriter --- */
        .message-text {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px; border-radius: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem; color: var(--color-texto);
            line-height: 1.4; border: 1px dashed var(--color-girasol);
            margin-top: 10px; min-height: 100px;
        }
        .signature {
            display: block; margin-top: 15px;
            font-size: 1.3rem; color: var(--color-girasol-dark);
            font-weight: bold; opacity: 0;
            transition: opacity 1s;
        }

        .footer-note { font-size: 0.7rem; color: #aaa; margin-top: 20px; letter-spacing: 2px; }
        .hidden { display: none !important; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

    </style>
</head>
<body>

    <div id="capa-inicio" onclick="iniciarFlorecimiento()">
        <span class="girasol-principal">🌻</span>
        <p class="text-inicio">Toca el girasol para ver florecer nuestro amor</p>
    </div>

    <div id="capa-contenido" class="hidden">
        
        <div id="corazon-bouquet" class="bouquet-heart-container"></div>

        <div id="tarjeta-mensaje" class="message-card">
            <h1>Flores amarillas para mi amor bonito:</h1>
            <p class="sub-msg">Nuestro tiempo juntos 🌻</p>

            <div id="seccion-contador" class="hidden">
                <div class="counter-grid">
                    <div class="counter-box"><span id="years" class="counter-num">0</span><span class="counter-label">Años</span></div>
                    <div class="counter-box"><span id="months" class="counter-num">0</span><span class="counter-label">Meses</span></div>
                    <div class="counter-box"><span id="days" class="counter-num">0</span><span class="counter-label">Días</span></div>
                </div>
                <div class="time-grid">
                    <div class="counter-box" style="background: white;"><span id="hours" class="counter-num">0</span><span class="counter-label">Horas</span></div>
                    <div class="counter-box" style="background: white;"><span id="minutes" class="counter-num">0</span><span class="counter-label">Min</span></div>
                    <div class="counter-box" style="background: white;"><span id="seconds" class="counter-num">0</span><span class="counter-label">Seg</span></div>
                </div>
            </div>

            <div id="texto-typewriter" class="message-text"></div>
            <span id="firma-amor" class="signature">ATT: El amor de tu vida</span>

            <p class="footer-note">PARA SIEMPRE ❤️</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Fecha de inicio (28 de febrero de 2026 - 3 semanas antes de hoy)
        const FECHA_INICIO = new Date('2026-02-28T00:00:00'); 
        const MENSAJE_COMPLETO = "si pudiera elegir un lugar seguro seria a tu lado.\ncada dia te quiero mas, cada dia me enamoro mas de ti, cada dia contigo es mejor.";

        // Coordenadas para formar un corazón (30 girasoles)
        const PUNTOS_CORAZON = [
            {x: 150, y: 70}, {x: 190, y: 50}, {x: 230, y: 60}, {x: 260, y: 90}, {x: 270, y: 130}, {x: 250, y: 170}, {x: 210, y: 210}, {x: 170, y: 240}, {x: 150, y: 260},
            {x: 130, y: 240}, {x: 90, y: 210}, {x: 50, y: 170}, {x: 30, y: 130}, {x: 40, y: 90}, {x: 70, y: 60}, {x: 110, y: 50}, {x: 150, y: 90}, 
            {x: 190, y: 90}, {x: 220, y: 110}, {x: 230, y: 140}, {x: 210, y: 180}, {x: 180, y: 210}, {x: 120, y: 210}, {x: 90, y: 180}, {x: 70, y: 140}, {x: 80, y: 110}, {x: 110, y: 90},
            {x: 150, y: 130}, {x: 180, y: 140}, {x: 120, y: 140}
        ];

        // Función Principal al hacer CLICK
        function iniciarFlorecimiento() {
            // Ocultar pantalla inicial
            document.getElementById('capa-inicio').style.opacity = '0';
            setTimeout(() => { document.getElementById('capa-inicio').classList.add('hidden'); }, 500);

            // Mostrar contenido
            document.getElementById('capa-contenido').classList.remove('hidden');

            // 1. Hacer crecer el Ramo Corazón
            const contenedor = document.getElementById('corazon-bouquet');
            PUNTOS_CORAZON.forEach((punto, index) => {
                const flor = document.createElement('span');
                flor.classList.add('girasol-corazon');
                flor.innerHTML = (Math.random() > 0.2) ? '🌻' : '🌼'; // Mezcla de flores
                flor.style.left = (punto.x - 20) + 'px'; // Ajuste de centro
                flor.style.top = (punto.y - 20) + 'px';
                
                // Retraso escalonado para la animación de crecimiento
                flor.style.animation = `growFlower 0.6s ease-out ${index * 0.1}s forwards`;
                
                contenedor.appendChild(flor);
            });

            // 2. Mostrar Tarjeta y escribir mensaje (después de que crezca el corazón)
            const tiempoCorazon = PUNTOS_CORAZON.length * 100 + 600;
            setTimeout(() => {
                document.getElementById('tarjeta-mensaje').classList.add('visible');
                // Iniciar Typewriter
                setTimeout(() => { typeWriter(); }, 1000);
            }, tiempoCorazon);
        }

        // --- EFECTO TYPEWRITER (ESCRITURA POCO A POCO) ---
        function typeWriter() {
            let i = 0;
            let speed = 60; // milisegundos por letra
            const elementoTexto = document.getElementById('texto-typewriter');
            
            function typing() {
                if (i < MENSAJE_COMPLETO.length) {
                    if (MENSAJE_COMPLETO.charAt(i) === '\n') {
                        elementoTexto.innerHTML += '<br>';
                    } else {
                        elementoTexto.innerHTML += MENSAJE_COMPLETO.charAt(i);
                    }
                    i++;
                    setTimeout(typing, speed);
                } else {
                    // Al terminar el mensaje, mostrar la firma y el contador
                    document.getElementById('firma-amor').style.opacity = '1';
                    setTimeout(() => {
                        document.getElementById('seccion-contador').classList.remove('hidden');
                        document.getElementById('seccion-contador').style.animation = 'fadeIn 1s forwards';
                        iniciarCalculoContador();
                    }, 1000);
                }
            }
            typing();
        }

        // --- LÓGICA DEL CONTADOR (AÑOS, MESES, DÍAS...) ---
        function iniciarCalculoContador() {
            function actualizarContador() {
                const ahora = new Date();
                let diff = ahora - FECHA_INICIO;

                let segundos = Math.floor(diff / 1000);
                let minutos = Math.floor(segundos / 60);
                let horas = Math.floor(minutos / 60);

                let anios = ahora.getFullYear() - FECHA_INICIO.getFullYear();
                let meses = ahora.getMonth() - FECHA_INICIO.getMonth();
                let dias = ahora.getDate() - FECHA_INICIO.getDate();

                if (meses < 0 || (meses === 0 && ahora.getDate() < FECHA_INICIO.getDate())) {
                    anios--; meses += 12;
                }
                if (dias < 0) {
                    const ultimoDiaMesAnterior = new Date(ahora.getFullYear(), ahora.getMonth(), 0).getDate();
                    meses--; dias += ultimoDiaMesAnterior;
                }

                document.getElementById('years').innerText = anios;
                document.getElementById('months').innerText = meses;
                document.getElementById('days').innerText = dias;
                document.getElementById('hours').innerText = horas % 24;
                document.getElementById('minutes').innerText = minutos % 60;
                document.getElementById('seconds').innerText = segundos % 60;
            }
            setInterval(actualizarContador, 1000);
            actualizarContador();
        }

        // --- CREACIÓN DE FLORES VOLADORAS (PASIVAS) ---
        function crearFlor() {
            const flor = document.createElement('div');
            flor.classList.add('flower-bg');
            const flores = ['🌻', '🌼', '💛', '🌻'];
            flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];
            flor.style.left = Math.random() * 100 + 'vw';
            flor.style.animationDuration = Math.random() * 3 + 6 + 's';
            flor.style.fontSize = Math.random() * 15 + 10 + 'px';
            document.body.appendChild(flor);
            setTimeout(() => { flor.remove(); }, 9000);
        }
        setInterval(crearFlor, 500);

    </script>
</body>
</html>
