<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para mi Amor Bonito 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-girasol: #FFD700;
            --color-girasol-dark: #FFA500;
            --color-tallo: #4CAF50;
            --color-texto: #5D4037;
            --fondo-cielo: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 70%, #C8E6C9 100%);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--fondo-cielo);
            min-height: 100vh; overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Flores Amarillas Volando --- */
        .flower-bg {
            position: absolute; top: -10%; color: var(--color-girasol);
            animation: fall linear forwards; z-index: 0;
            opacity: 0.8; pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* --- Tarjeta Principal --- */
        .card {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 35px 20px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center; z-index: 10;
            border: 4px solid var(--color-girasol);
            animation: popIn 1s ease-out;
            margin: 20px;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.3rem; color: var(--color-texto); margin-bottom: 5px; line-height: 1.2; }
        .sub-msg { color: #4CAF50; font-weight: 600; margin-bottom: 20px; font-size: 1.1rem; }

        /* --- Estilo del Contador --- */
        .counter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 15px;
        }
        .time-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 25px;
        }
        .counter-box {
            background: #fff9c4; padding: 12px 5px; border-radius: 15px;
            border: 1px solid var(--color-girasol);
        }
        .counter-num { display: block; font-size: 1.5rem; font-weight: bold; color: var(--color-girasol-dark); }
        .counter-label { font-size: 0.7rem; color: #777; text-transform: uppercase; font-weight: bold; }

        /* --- El Mensaje Especial --- */
        .message-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px; border-radius: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem; color: var(--color-texto);
            line-height: 1.4; border: 1px dashed var(--color-girasol);
            margin-top: 10px;
        }
        .signature {
            display: block; margin-top: 15px;
            font-size: 1.3rem; color: var(--color-girasol-dark);
            font-weight: bold;
        }

        .footer-note { font-size: 0.7rem; color: #aaa; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Flores amarillas para mi amor bonito:</h1>
        <p class="sub-msg">Nuestro tiempo juntos 🌻</p>

        <div class="counter-grid">
            <div class="counter-box">
                <span id="years" class="counter-num">0</span>
                <span class="counter-label">Años</span>
            </div>
            <div class="counter-box">
                <span id="months" class="counter-num">0</span>
                <span class="counter-label">Meses</span>
            </div>
            <div class="counter-box">
                <span id="days" class="counter-num">0</span>
                <span class="counter-label">Días</span>
            </div>
        </div>
        
        <div class="time-grid">
            <div class="counter-box" style="background: white;">
                <span id="hours" class="counter-num" style="font-size: 1.2rem;">0</span>
                <span class="counter-label">Horas</span>
            </div>
            <div class="counter-box" style="background: white;">
                <span id="minutes" class="counter-num" style="font-size: 1.2rem;">0</span>
                <span class="counter-label">Min</span>
            </div>
            <div class="counter-box" style="background: white;">
                <span id="seconds" class="counter-num" style="font-size: 1.2rem;">0</span>
                <span class="counter-label">Seg</span>
            </div>
        </div>

        <div class="message-box">
            si pudiera elegir un lugar seguro seria a tu lado.<br>
            cada dia te quiero mas, cada dia me enamoro mas de ti, cada dia contigo es mejor.
            <span class="signature">ATT: El amor de tu vida</span>
        </div>

        <p class="footer-note">PARA SIEMPRE ❤️</p>
    </div>

    <script>
        // FECHA DE INICIO: Hace exactamente 3 semanas desde hoy (28 de febrero de 2026)
        const FECHA_INICIO = new Date('2026-02-28T00:00:00'); 

        function actualizarContador() {
            const ahora = new Date();
            let diff = ahora - FECHA_INICIO;

            // Cálculos de tiempo
            let segundos = Math.floor(diff / 1000);
            let minutos = Math.floor(segundos / 60);
            let horas = Math.floor(minutos / 60);
            let diasTotales = Math.floor(horas / 24);

            // Cálculos precisos de Años, Meses y Días
            let anios = ahora.getFullYear() - FECHA_INICIO.getFullYear();
            let meses = ahora.getMonth() - FECHA_INICIO.getMonth();
            let dias = ahora.getDate() - FECHA_INICIO.getDate();

            if (meses < 0 || (meses === 0 && ahora.getDate() < FECHA_INICIO.getDate())) {
                anios--;

                dias += ultimoDiaMesAnterior;
            }

            // Actualizar el HTML
            document.getElementById('years').innerText = anios;
            document.getElementById('months').innerText = meses;
            document.getElementById('days').innerText = dias;
            document.getElementById('hours').innerText = horas % 24;
            document.getElementById('minutes').innerText = minutos % 60;
            document.getElementById('seconds').innerText = segundos % 60;
        }

        // Animación de flores amarillas (🌻, 🌼, 💛)
        function crearFlor() {
            const flor = document.createElement('div');
            flor.classList.add('flower-bg');
            const flores = ['🌻', '🌼', '💛', '🌻'];
            flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];
            flor.style.left = Math.random() * 100 + 'vw';
            flor.style.animationDuration = Math.random() * 3 + 5 + 's';
            flor.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(flor);
            setTimeout(() => { flor.remove(); }, 8000);
        }

        setInterval(crearFlor, 400);
        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
